<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password - Visto Easy</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(180deg, #f7f8fb 0%, #eef2f8 100%); }
    .auth-landing { width: min(720px, 92vw); background: rgba(255,255,255,.88); border: 1px solid rgba(34,36,40,.08); border-radius: 28px; padding: 28px; box-shadow: 0 24px 80px rgba(22,24,29,.08); }
    .auth-landing h1 { margin: 10px 0 12px; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.02; }
    .auth-landing p { color: var(--muted); max-width: 56ch; }
    .auth-landing .result { margin-top: 18px; padding: 14px 16px; border-radius: 16px; background: #f7f9fc; border: 1px solid #dce3ee; }
    .auth-landing .result.ok { border-color: rgba(33, 150, 83, .28); background: rgba(33, 150, 83, .06); }
    .auth-landing .result.err { border-color: rgba(180, 35, 24, .22); background: rgba(180, 35, 24, .05); }
    .auth-landing .actions { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .auth-landing form { margin-top: 18px; display: grid; gap: 12px; }
    .auth-landing input { width: 100%; }
    .password-field { position: relative; }
    .password-field input { padding-right: 88px; }
    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid #d9e0eb;
      border-radius: 999px;
      background: #fff;
      min-height: 30px;
      padding: 0 10px;
      font-weight: 700;
      font-size: .78rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="auth-landing">
    <div class="actions" style="justify-content: flex-end; margin-top: 0;">
      <button class="btn btn-ghost" type="button" data-lang="it" aria-pressed="true">🇮🇹</button>
      <button class="btn btn-ghost" type="button" data-lang="en" aria-pressed="false">🇬🇧</button>
    </div>
    <p class="eyebrow">Visto Easy</p>
    <h1 id="titleText">Imposta una nuova password.</h1>
    <p id="subtitleText">Usa il link ricevuto via email per completare il reset o l'attivazione dell'account.</p>
    <div id="resultBox" class="result">Inserisci la nuova password per continuare.</div>
    <form id="resetForm">
      <label>
        <span id="passwordLabel">Nuova password</span>
        <div class="password-field">
          <input id="passwordInput" name="password" type="password" minlength="8" required>
          <button id="passwordToggle" class="password-toggle" type="button">Mostra</button>
        </div>
      </label>
      <button class="btn btn-solid" id="btnSubmit" type="submit">Conferma nuova password</button>
    </form>
    <div class="actions">
      <a class="btn btn-ghost" id="btnHome" href="/">Torna alla home</a>
      <a class="btn btn-ghost" id="btnLogin" href="/#auth">Vai al login</a>
    </div>
  </main>
  <script>
    (() => {
      const LANG_KEY = 'visto_easy_lang_v1';
      const STRINGS = {
        it: {
          title: 'Imposta una nuova password.',
          subtitle: 'Usa il link ricevuto via email per completare il reset o l\'attivazione dell\'account.',
          prompt: 'Inserisci la nuova password per continuare.',
          noToken: 'Token mancante. Apri il link ricevuto via email.',
          tooShort: 'La password deve avere almeno 8 caratteri.',
          failed: 'Reset non riuscito',
          success: 'Password aggiornata con successo. Puoi accedere con le nuove credenziali.',
          passwordLabel: 'Nuova password',
          passwordToggleShow: 'Mostra',
          passwordToggleHide: 'Nascondi',
          submit: 'Conferma nuova password',
          home: 'Torna alla home',
          login: 'Vai al login',
        },
        en: {
          title: 'Set a new password.',
          subtitle: 'Use the link received by email to complete password reset or account activation.',
          prompt: 'Enter your new password to continue.',
          noToken: 'Missing token. Open the link received by email.',
          tooShort: 'Password must be at least 8 characters long.',
          failed: 'Reset failed',
          success: 'Password updated successfully. You can now sign in with your new credentials.',
          passwordLabel: 'New password',
          passwordToggleShow: 'Show',
          passwordToggleHide: 'Hide',
          submit: 'Confirm new password',
          home: 'Back to home',
          login: 'Go to login',
        },
      };
      const normalizeLang = (lang) => (String(lang || '').toLowerCase() === 'en' ? 'en' : 'it');
      const getLang = () => normalizeLang(window.localStorage.getItem(LANG_KEY) || document.documentElement.lang || navigator.language?.slice(0, 2));
      let lang = getLang();

      const titleText = document.getElementById('titleText');
      const subtitleText = document.getElementById('subtitleText');
      const passwordLabel = document.getElementById('passwordLabel');
      const btnSubmit = document.getElementById('btnSubmit');
      const passwordToggle = document.getElementById('passwordToggle');
      const btnHome = document.getElementById('btnHome');
      const btnLogin = document.getElementById('btnLogin');
      const box = document.getElementById('resultBox');
      const form = document.getElementById('resetForm');

      const syncPasswordToggle = () => {
        const isVisible = document.getElementById('passwordInput').type === 'text';
        passwordToggle.textContent = isVisible ? STRINGS[lang].passwordToggleHide : STRINGS[lang].passwordToggleShow;
        passwordToggle.setAttribute('aria-label', passwordToggle.textContent);
        passwordToggle.setAttribute('aria-pressed', isVisible ? 'true' : 'false');
      };

      const applyLang = () => {
        const s = STRINGS[lang];
        document.documentElement.lang = lang;
        titleText.textContent = s.title;
        subtitleText.textContent = s.subtitle;
        passwordLabel.textContent = s.passwordLabel;
        btnSubmit.textContent = s.submit;
        btnHome.textContent = s.home;
        btnLogin.textContent = s.login;
        syncPasswordToggle();
        if (!box.dataset.state || box.dataset.state === 'prompt') {
          box.textContent = s.prompt;
        }
        document.querySelectorAll('[data-lang]').forEach((btn) => {
          const active = btn.getAttribute('data-lang') === lang;
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
      };

      document.querySelectorAll('[data-lang]').forEach((btn) => {
        btn.addEventListener('click', () => {
          lang = normalizeLang(btn.getAttribute('data-lang'));
          window.localStorage.setItem(LANG_KEY, lang);
          applyLang();
        });
      });

      passwordToggle.addEventListener('click', () => {
        const input = document.getElementById('passwordInput');
        input.type = input.type === 'password' ? 'text' : 'password';
        syncPasswordToggle();
      });
      applyLang();

      const token = new URLSearchParams(window.location.search).get('token') || '';
      if (!token) {
        box.className = 'result err';
        box.dataset.state = 'error';
        box.textContent = STRINGS[lang].noToken;
        form.querySelector('button').disabled = true;
        return;
      }
      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const newPassword = document.getElementById('passwordInput').value;
        if (newPassword.length < 8) {
          box.className = 'result err';
          box.dataset.state = 'error';
          box.textContent = STRINGS[lang].tooShort;
          return;
        }
        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: newPassword }),
          });
          const data = await response.json().catch(() => null);
          if (!response.ok) throw new Error((data && (data.error || data.message)) || STRINGS[lang].failed);
          box.className = 'result ok';
          box.dataset.state = 'success';
          box.textContent = STRINGS[lang].success;
          form.reset();
        } catch (err) {
          box.className = 'result err';
          box.dataset.state = 'error';
          box.textContent = err.message || STRINGS[lang].failed;
        }
      });
    })();
  </script>
</body>
</html>
