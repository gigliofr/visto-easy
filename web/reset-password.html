<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password - Visto Easy</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/reset-password.css">
</head>
<body>
  <main class="reset-shell">
    <header class="reset-top">
      <span class="brand">Visto Easy</span>
      <div class="lang-switch" aria-label="Language selector">
        <button class="lang-btn" type="button" data-lang="it" aria-pressed="true">🇮🇹</button>
        <button class="lang-btn" type="button" data-lang="en" aria-pressed="false">🇬🇧</button>
      </div>
    </header>

    <section class="reset-main">
      <div class="hero">
        <div class="illustration" aria-hidden="true">
          <svg viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="110" cy="110" r="94" fill="url(#g1)"/>
            <rect x="61" y="55" width="98" height="132" rx="18" fill="#ffffff" stroke="#C7D7EE" stroke-width="3"/>
            <rect x="80" y="85" width="62" height="10" rx="5" fill="#DCE8F8"/>
            <rect x="80" y="104" width="48" height="10" rx="5" fill="#E7EEF9"/>
            <rect x="80" y="123" width="48" height="10" rx="5" fill="#EFF4FB"/>
            <rect x="90" y="149" width="40" height="24" rx="10" fill="#E9F9F0" stroke="#93D9B2" stroke-width="3"/>
            <path d="M103 161L109 167L120 154" stroke="#1F7A4D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="g1" x1="34" y1="32" x2="186" y2="188" gradientUnits="userSpaceOnUse">
                <stop stop-color="#D8E8FF"/>
                <stop offset="1" stop-color="#EEF5FF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 id="titleText">Imposta una nuova password.</h1>
        <p class="subtitle" id="subtitleText">Usa il link ricevuto via email per completare il reset o l'attivazione dell'account.</p>
      </div>

      <div id="resultBox" class="status">Inserisci la nuova password per continuare.</div>

      <form id="resetForm" class="reset-form">
        <label>
          <span id="passwordLabel">Nuova password</span>
          <div class="password-field">
            <input id="passwordInput" name="password" type="password" minlength="8" required>
            <button id="passwordToggle" class="password-toggle" type="button">Mostra</button>
          </div>
        </label>
        <button class="btn btn-primary" id="btnSubmit" type="submit">Conferma nuova password</button>
      </form>

      <div class="actions">
        <a class="btn btn-secondary" id="btnLogin" href="/#auth">Vai al login</a>
        <a class="btn btn-secondary" id="btnHome" href="/">Torna alla home</a>
      </div>
    </section>
  </main>

  <script src="/assets/js/reset-password.js" defer></script>
</body>
</html>
