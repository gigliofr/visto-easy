<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verifica email - Visto Easy</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(180deg, #f7f8fb 0%, #eef2f8 100%); }
    .auth-landing { width: min(720px, 92vw); background: rgba(255,255,255,.88); border: 1px solid rgba(34,36,40,.08); border-radius: 28px; padding: 28px; box-shadow: 0 24px 80px rgba(22,24,29,.08); }
    .auth-landing h1 { margin: 10px 0 12px; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.02; }
    .auth-landing p { color: var(--muted); max-width: 56ch; }
    .auth-landing .result { margin-top: 18px; padding: 14px 16px; border-radius: 16px; background: #f7f9fc; border: 1px solid #dce3ee; }
    .auth-landing .result.ok { border-color: rgba(33, 150, 83, .28); background: rgba(33, 150, 83, .06); }
    .auth-landing .result.err { border-color: rgba(180, 35, 24, .22); background: rgba(180, 35, 24, .05); }
    .auth-landing .actions { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .auth-landing code { word-break: break-all; }
  </style>
</head>
<body>
  <main class="auth-landing">
    <p class="eyebrow">Visto Easy</p>
    <h1>Verifica il tuo indirizzo email.</h1>
    <p>Questa pagina completa l'attivazione dell'account richiesto in fase di registrazione.</p>
    <div id="resultBox" class="result">Verifica in corso...</div>
    <div class="actions">
      <a class="btn btn-solid" href="/">Torna alla home</a>
      <a class="btn btn-ghost" href="/#auth">Vai al login</a>
    </div>
  </main>
  <script>
    (async () => {
      const box = document.getElementById('resultBox');
      const token = new URLSearchParams(window.location.search).get('token') || '';
      if (!token) {
        box.className = 'result err';
        box.textContent = 'Token mancante. Apri il link ricevuto via email.';
        return;
      }
      try {
        const response = await fetch('/api/auth/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await response.json().catch(() => null);
        if (!response.ok) throw new Error((data && (data.error || data.message)) || 'Verifica non riuscita');
        box.className = 'result ok';
        box.innerHTML = 'Email verificata con successo. Ora puoi accedere al tuo account.';
      } catch (err) {
        box.className = 'result err';
        box.textContent = err.message || 'Verifica non riuscita';
      }
    })();
  </script>
</body>
</html>
