<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verifica email - Visto Easy</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/verify-email.css">
</head>
<body>
  <main class="verify-shell">
    <header class="verify-top">
      <span class="brand">Visto Easy</span>
      <div class="lang-switch" aria-label="Language selector">
        <button class="lang-btn" type="button" data-lang="it" aria-pressed="true">🇮🇹</button>
        <button class="lang-btn" type="button" data-lang="en" aria-pressed="false">🇬🇧</button>
      </div>
    </header>

    <section class="verify-main">
      <div class="hero">
        <div class="illustration" aria-hidden="true">
          <svg viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="110" cy="110" r="94" fill="url(#g1)"/>
            <rect x="57" y="58" width="106" height="132" rx="18" fill="#ffffff" stroke="#C7D7EE" stroke-width="3"/>
            <rect x="73" y="82" width="74" height="9" rx="4.5" fill="#DCE8F8"/>
            <rect x="73" y="100" width="62" height="9" rx="4.5" fill="#E7EEF9"/>
            <rect x="73" y="118" width="52" height="9" rx="4.5" fill="#EFF4FB"/>
            <circle cx="149" cy="160" r="30" fill="#E9F9F0" stroke="#93D9B2" stroke-width="3"/>
            <path d="M136 161L146 171L164 150" stroke="#1F7A4D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="g1" x1="34" y1="32" x2="186" y2="188" gradientUnits="userSpaceOnUse">
                <stop stop-color="#D8E8FF"/>
                <stop offset="1" stop-color="#EEF5FF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 id="titleText">Registrazione completata con successo.</h1>
        <p class="subtitle" id="subtitleText">Stiamo verificando il tuo indirizzo email per attivare il tuo profilo e permetterti di usare tutti i servizi.</p>
      </div>

      <div id="resultBox" class="status">Verifica in corso...</div>

      <div class="actions">
        <a class="btn btn-primary" id="btnLogin" href="/#auth">Vai al login</a>
        <a class="btn btn-secondary" id="btnHome" href="/">Torna alla home</a>
      </div>
    </section>
  </main>

  <script src="/assets/js/verify-email.js" defer></script>
</body>
</html>
